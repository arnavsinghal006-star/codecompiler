<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compiler</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="codemirror-5.65.21/lib/codemirror.css">
<link rel="stylesheet" href="codemirror-5.65.21/theme/dracula.css">

<script src="codemirror-5.65.21/lib/codemirror.js"></script>
<script src="codemirror-5.65.21/mode/clike/clike.js"></script>
<script src="codemirror-5.65.21/mode/python/python.js"></script>

<style>
body { background:#1e1e1e; }
.CodeMirror { height: 500px; }
</style>
</head>

<body>

<div class="row m-3">

<div class="col">

<div class="d-flex justify-content-between mb-2 bg-dark p-2 rounded">

<select id="language" class="form-select w-25">
<option value="cpp">Cpp</option>
<option value="java">Java</option>
<option value="python">Python</option>
</select>

<button type="button" id="runBtn" class="btn btn-success">Run ▶</button>

</div>

<textarea id="editor"></textarea>

</div>

<div class="col bg-dark p-3 rounded">

<h5 class="text-light">Input</h5>
<textarea id="input" class="form-control mb-3"></textarea>

<h5 class="text-light">Output</h5>
<textarea id="output" class="form-control"></textarea>

</div>

</div>

<script>

var editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
    mode: "text/x-c++src",
    theme: "dracula",
    lineNumbers: true
});

let langSelect = document.getElementById("language");

langSelect.addEventListener("change", function () {
    if (langSelect.value === "java") {
        editor.setOption("mode", "text/x-java");
    } else if (langSelect.value === "python") {
        editor.setOption("mode", "python");
    } else {
        editor.setOption("mode", "text/x-c++src");
    }
});

document.getElementById("runBtn").addEventListener("click", async function () {

    let output = document.getElementById("output");
    output.value = "Running...";

    try {
        let res = await fetch("http://127.0.0.1:3000/compile", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                code: editor.getValue(),
                input: document.getElementById("input").value,
                lang: langSelect.value
            })
        });

        let data = await res.json();

        output.value = data.output || data.error;

    } catch (err) {
        console.error(err);
        output.value = "Server Error";
    }

});

</script>

</body>
</html>
